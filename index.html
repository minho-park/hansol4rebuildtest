<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <!-- Android Chrome 주소창을 앱 배경색과 통일 (다크/라이트 자동 전환) -->
    <meta name="theme-color" content="#0f1115" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f6f9" media="(prefers-color-scheme: light)" />
    <title>인증</title>
    <link rel="stylesheet" href="style.css?v=10" />
  </head>
  <body>
    <main class="card" id="auth-card">
      <h1>인증</h1>
      <p class="hint">등록된 이름과 휴대폰 번호를 입력해 주세요.</p>
      <form id="auth-form" autocomplete="off">
        <input
          id="name"
          name="name"
          type="text"
          placeholder="이름"
          required
          autocomplete="off"
        />
        <input
          id="phone"
          name="phone"
          type="tel"
          inputmode="numeric"
          placeholder="010-1234-5678"
          pattern="[0-9\-]*"
          required
          autocomplete="off"
        />
        <button id="submit-btn" type="submit">확인</button>
      </form>
      <p id="status" class="status" role="status" aria-live="polite"></p>

      <div class="notice">
        <p class="notice-text">소유주 인증이 필요하신 분은 대표번호로 연락 바랍니다.</p>
        <a href="tel:01012345678" class="notice-phone">대표번호: 010-1234-5678</a>
      </div>
    </main>

    <script src="app.js?v=8"></script>
  </body>
</html>
